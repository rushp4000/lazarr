# Lazarr config — copy to config.yaml and fill in. See docs/05 §7 and docs/11.
torbox:
  api_key: "PUT-YOUR-TORBOX-KEY-HERE"        # from your TorBox account
  api_base: "https://api.torbox.app/v1/api"  # verified base (the /v1 matters)

qbit:
  listen: ":8080"        # the arr points its qBittorrent client here
  username: "lazarr"     # what the arr sends (optional check)
  password: "lazarr"

paths:
  download_dir: "/data/symlinks"   # arr's qBit "save path"; per-category subdirs created here
  fuse_mount: "/data/torbox"       # FUSE virtual tree root
  db_path: "/data/lazarr.sqlite"   # SQLite catalog (default shown)
  probe_cache_dir: "/data/probe"   # Phase 2: bounded on-disk header cache (default shown)

categories:                # must match arr names (Radarr movieCategory / Sonarr tvCategory)
  - "radarr_hin"           # start with the canary only

policy:
  allow_uncached: false    # cached-only default; toggle on to let TorBox really download uncached
  idle_ttl: "15m"          # release a materialized item after this much no-access
  max_hold: "24h"          # hard ceiling regardless of access (well under TorBox's 30d)
  # active_slots: concurrent materializations. SET TO YOUR TORBOX PLAN'S SLOT COUNT.
  #   Essential = 3 (default). Pro/Standard allow more -> raise to match.
  #   Never set higher than your plan (extra adds get rejected). 0 = auto-detect.
  active_slots: 3
  probe_cache: true        # cache file headers so Plex scans of new imports don't re-add

ownership:
  # Lazarr runs as ROOT inside the container (required to mount FUSE in Docker), but the
  # *arr suite runs as its own uid and must be able to move/delete the symlinks Lazarr
  # creates. Set these to your arr's uid:gid and Lazarr chowns every symlink + dir it
  # creates to them. 0 = disabled (leave as root). See docs/20-DEPLOYMENT.md.
  puid: 0                  # e.g. 1000 — the uid your Sonarr/Radarr runs as
  pgid: 0                  # e.g. 1000 — the gid your Sonarr/Radarr runs as

metrics:
  # OPT-IN observability on a SEPARATE port (kept off the arr-facing qbit port). Empty =
  # disabled. When set, serves Prometheus /metrics and JSON /health. Unauthenticated like
  # the qbit port — bind to the trusted LAN only.
  # Default :9090 so the docker-compose.example.yml healthcheck works out of the box (S8).
  # Clearing it ("") disables the admin port AND breaks that healthcheck — if you disable
  # metrics, also remove the `healthcheck:` block from your compose file (or the container
  # will be marked unhealthy forever).
  listen: ":9090"

webui:
  # OPT-IN human dashboard on a SEPARATE port. Empty = disabled. Serves the Lazarr
  # dashboard (releases table, live materialized set, ToS audit, config view).
  # Like the qbit and metrics ports it is unauthenticated by default — bind to the trusted
  # LAN. Set username + password to enable HTTP Basic Auth (recommended; the UI has
  # mutating actions: force-release, run-audit).
  listen: ""               # e.g. ":8081"
  username: ""             # leave empty to disable auth (trusted-LAN only)
  password: ""             # must be set together with username
