# Release pipeline — runs ONLY on a v* tag push (a user-gated action: tagging
# v1.0.0 triggers it). Publishes binary archives via GoReleaser and a multi-arch
# container image to GHCR. Auth uses the built-in GITHUB_TOKEN (no extra secret).
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  goreleaser:
    name: binaries + GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub release + upload archives
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # GoReleaser needs full history + tags for the changelog
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  image:
    name: multi-arch image → GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to ghcr.io
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v4   # arm64 emulation for the build
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/rushp4000/lazarr
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Build & push (linux/amd64,arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Stamp the binary version into the image so /health reports the real tag, not
          # "dev" (S7). github.ref_name on a v* tag push is the tag, e.g. v1.0.0.
          build-args: |
            VERSION=${{ github.ref_name }}
